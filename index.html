<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>麥當勞台灣點餐引擎 | 預算與熱量建議</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main id="app" class="layout">
    <header class="hero">
      <h1>麥當勞台灣點餐引擎</h1>
      <p>資料分層 + 規則引擎 + 每月可更新版本</p>
    </header>

    <section class="panel">
      <h2>資料狀態</h2>
      <div id="dataStatus"></div>
    </section>

    <section class="panel">
      <h2>目前促銷</h2>
      <div id="promoCards" class="promo-grid"></div>
    </section>

    <section class="panel control-panel">
      <h2>點餐條件</h2>
      <div class="controls">
        <label>
          時段
          <select id="mealPeriod">
            <option value="all_day">全日餐</option>
            <option value="breakfast">早餐時段</option>
            <option value="all">全部品項</option>
          </select>
        </label>

        <label>
          目標模式
          <select id="goalSelect">
            <option value="balanced">平衡（價格+熱量）</option>
            <option value="budget">預算優先</option>
            <option value="calorie">熱量優先</option>
          </select>
        </label>

        <label>
          預算上限
          <input id="budgetInput" type="number" min="0" step="1" placeholder="例如 150">
        </label>

        <label>
          熱量上限
          <input id="calorieInput" type="number" min="0" step="1" placeholder="例如 800">
        </label>
      </div>

      <div class="action-row">
        <button id="calcBtn" class="btn primary" type="button">計算 5 種省錢策略</button>
        <button id="recommendBtn" class="btn" type="button">快速推薦（預算/熱量）</button>
        <button id="clearBtn" class="btn danger" type="button">清空選擇</button>
      </div>
    </section>

    <section class="panel">
      <h2>品項選擇</h2>
      <div id="itemPicker"></div>
    </section>

    <section class="panel">
      <h2>本次選擇摘要</h2>
      <div id="selectionSummary"></div>
    </section>

    <section class="panel">
      <h2>5 種方案結果</h2>
      <div id="planResults" class="plan-grid"></div>
    </section>

    <section class="panel">
      <h2>快速建議</h2>
      <div id="recommendationResults" class="rec-grid"></div>
    </section>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
